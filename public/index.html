<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Absensi">
  <title>Absensi – reFrame Photobooth</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="header-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
            <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </div>
        <div class="header-text">
          <h1><span class="re">re</span><span class="Frame">Frame</span><span class="sub">photobooth · absensi</span></h1>
          <span id="liveDateTime">Memuat...</span>
        </div>
        <div class="header-user" id="headerUser">
          <div class="user-avatar" id="userAvatar">–</div>
          <button class="btn-logout" id="logoutBtn" title="Keluar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-nav" id="tabNav">
      <button class="tab-btn active" data-tab="absensi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Absensi
      </button>
      <button class="tab-btn admin-only" data-tab="riwayat" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        Riwayat
      </button>
      <!-- Admin tab: shown only for admin -->
      <button class="tab-btn admin-only" data-tab="admin" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        Pengguna
      </button>
    </nav>

    <!-- Content -->
    <main class="main">

      <!-- ===== TAB ABSENSI ===== -->
      <div class="tab-content active" id="tab-absensi">

        <div class="stats-bar">
          <div class="stat-item">
            <span class="stat-num" id="statToday">–</span>
            <span class="stat-label">Hari Ini</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-num mara" id="statMara">–</span>
            <span class="stat-label">Mara</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <span class="stat-num lantedua" id="statLantedua">–</span>
            <span class="stat-label">Lantedua</span>
          </div>
        </div>

        <!-- User info strip (for pegawai) -->
        <div class="user-strip pegawai-only" id="userStrip" style="display:none">
          <div class="user-strip-avatar" id="stripAvatar"></div>
          <div>
            <div class="user-strip-name" id="stripName"></div>
            <div class="user-strip-role">Pegawai</div>
          </div>
        </div>

        <form class="form-card" id="attendanceForm" novalidate>

          <!-- Nama (editable only for admin) -->
          <div class="form-group" id="nameGroup">
            <label class="form-label" for="nameInput">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              Nama Pegawai
            </label>
            <input type="text" id="nameInput" class="form-input" placeholder="Masukkan nama lengkap" autocomplete="name" required>
            <span class="form-error" id="nameError">Nama wajib diisi</span>
          </div>

          <!-- Outlet -->
          <div class="form-group">
            <label class="form-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              Outlet
            </label>
            <div class="outlet-grid">
              <button type="button" class="outlet-card active" data-outlet="Mara">
                <span class="outlet-dot mara"></span>
                <span class="outlet-name">Mara</span>
                <svg class="outlet-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <path d="M5 13l4 4L19 7"/>
                </svg>
              </button>
              <button type="button" class="outlet-card" data-outlet="Lantedua">
                <span class="outlet-dot lantedua"></span>
                <span class="outlet-name">Lantedua</span>
                <svg class="outlet-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <path d="M5 13l4 4L19 7"/>
                </svg>
              </button>
            </div>
            <input type="hidden" id="outletInput" value="Mara">
          </div>

          <!-- Tanggal & Waktu -->
          <div class="form-group">
            <label class="form-label" for="dateInput">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              Tanggal &amp; Waktu
            </label>
            <div class="datetime-row">
              <input type="date" id="dateInput" class="form-input" required>
              <input type="time" id="timeInput" class="form-input time-input">
            </div>
          </div>

          <!-- Foto -->
          <div class="form-group">
            <label class="form-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              Foto Absensi
            </label>

            <div class="camera-box" id="cameraBox">
              <div class="camera-idle" id="cameraIdle">
                <div class="camera-icon-wrap">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                    <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                </div>
                <p>Ambil atau upload foto</p>
                <div class="camera-idle-btns">
                  <button type="button" class="btn-secondary" id="openCameraBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                      <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    Kamera
                  </button>
                  <button type="button" class="btn-secondary" id="openGalleryBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                      <circle cx="8.5" cy="8.5" r="1.5"/>
                      <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    Galeri
                  </button>
                </div>
              </div>

              <div class="camera-live" id="cameraLive" style="display:none">
                <video id="videoEl" autoplay playsinline muted></video>
                <div class="camera-live-controls">
                  <button type="button" class="btn-flip" id="flipCameraBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
                    </svg>
                  </button>
                  <button type="button" class="btn-capture" id="snapBtn">
                    <span class="capture-ring"></span>
                    <span class="capture-dot"></span>
                  </button>
                  <button type="button" class="btn-cancel-cam" id="cancelCameraBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                  </button>
                </div>
              </div>

              <div class="camera-preview" id="cameraPreview" style="display:none">
                <img id="photoPreviewImg" alt="Foto absensi">
                <canvas id="photoCanvas" style="display:none"></canvas>
                <div class="preview-badge">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M5 13l4 4L19 7"/>
                  </svg>
                  Foto siap
                </div>
                <button type="button" class="btn-retake" id="retakeBtn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                  </svg>
                  Ulangi
                </button>
              </div>
            </div>

            <input type="file" id="galleryInput" accept="image/*" style="display:none">
            <span class="form-error" id="photoError">Foto wajib diambil</span>
          </div>

          <button type="submit" class="btn-submit" id="submitBtn">
            <span class="submit-text">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              Simpan Absensi
            </span>
            <span class="submit-loading" style="display:none">
              <span class="spinner"></span>
              Menyimpan...
            </span>
          </button>
        </form>
      </div>

      <!-- ===== TAB RIWAYAT ===== -->
      <div class="tab-content" id="tab-riwayat">
        <div class="filter-card">
          <div class="filter-row">
            <input type="date" id="filterDate" class="filter-input">
            <select id="filterOutlet" class="filter-input filter-select">
              <option value="all">Semua Outlet</option>
              <option value="Mara">Mara</option>
              <option value="Lantedua">Lantedua</option>
            </select>
          </div>
          <div class="filter-row admin-only" id="searchRow" style="display:none">
            <input type="text" id="filterSearch" class="filter-input" placeholder="Cari nama pegawai...">
            <button class="btn-export" id="exportBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
              </svg>
              CSV
            </button>
          </div>
        </div>
        <div class="record-count" id="recordCount">Memuat data...</div>
        <div class="records-list" id="recordsList">
          <div class="skeleton-list">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
        </div>
      </div>

      <!-- ===== TAB ADMIN ===== -->
      <div class="tab-content" id="tab-admin">
        <div class="admin-header-card">
          <h2>Manajemen Pengguna</h2>
          <p>Daftar akun dan statistik absensi</p>
        </div>
        <div class="users-list" id="usersList">
          <div class="skeleton-list">
            <div class="skeleton-card" style="height:110px"></div>
            <div class="skeleton-card" style="height:110px"></div>
            <div class="skeleton-card" style="height:110px"></div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- Modal Sukses -->
  <div class="modal-overlay" id="successOverlay" style="display:none">
    <div class="modal-card success-modal">
      <div class="modal-icon-wrap success">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h3>Absensi Berhasil!</h3>
      <p id="successDetail"></p>
      <button class="btn-submit" id="successOkBtn">OK</button>
    </div>
  </div>

  <!-- Modal Foto Fullscreen -->
  <div class="modal-overlay photo-modal-overlay" id="photoOverlay" style="display:none" onclick="closePhotoModal()">
    <div class="photo-fullscreen">
      <img id="fullscreenPhoto" alt="Foto absensi">
      <button class="btn-close-photo" onclick="closePhotoModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Modal Konfirmasi Hapus -->
  <div class="modal-overlay" id="deleteOverlay" style="display:none">
    <div class="modal-card">
      <div class="modal-icon-wrap danger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </div>
      <h3>Hapus Absensi?</h3>
      <p id="deleteDetail">Data ini akan dihapus permanen.</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="deleteCancelBtn">Batal</button>
        <button class="btn-danger" id="deleteConfirmBtn">Hapus</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
