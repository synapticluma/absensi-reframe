<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#5CC8C2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Login – reFrame Photobooth</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:         #5CC8C2;
      --teal-dark:    #38ADAA;
      --teal-deeper:  #2A9490;
      --teal-xlight:  #EBF8F7;
      --yellow:       #F5C83A;
      --yellow-dark:  #D4A826;
      --yellow-light: #FEF5D4;
      --text:         #1A3A38;
      --text-muted:   #5A8480;
      --text-light:   #9DBFBD;
      --border:       #C5E6E4;
      --bg:           #EBF8F7;
      --danger:       #E05252;
    }

    body {
      font-family: 'Quicksand', -apple-system, sans-serif;
      min-height: 100dvh;
      background: linear-gradient(160deg, var(--teal-deeper) 0%, var(--teal) 55%, #7DD5CF 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    /* Decorative circles */
    body::before {
      content: '';
      position: fixed;
      top: -80px; right: -80px;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -60px; left: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: var(--yellow);
      opacity: .15;
      pointer-events: none;
    }

    /* ── Brand header ── */
    .brand-top {
      text-align: center;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .brand-camera {
      width: 72px; height: 72px;
      background: rgba(255,255,255,.18);
      border: 2px solid rgba(255,255,255,.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      backdrop-filter: blur(8px);
    }

    .brand-camera svg { width: 36px; height: 36px; color: white; }

    .brand-name {
      font-size: 32px;
      font-weight: 700;
      color: white;
      line-height: 1;
      letter-spacing: -.02em;
    }

    .brand-name .re   { font-weight: 500; }
    .brand-name .Frame { font-weight: 800; }

    .brand-sub {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,.7);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Card ── */
    .card {
      background: white;
      border-radius: 24px;
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 24px 64px rgba(26,58,56,.3), 0 8px 24px rgba(26,58,56,.15);
      position: relative;
      z-index: 1;
    }

    .card-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card-subtitle {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 22px;
    }

    /* ── Form ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 13px;
      width: 17px; height: 17px;
      color: var(--text-light);
      flex-shrink: 0;
    }

    input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(92,200,194,.18);
      background: white;
    }

    input::placeholder { color: var(--text-light); font-weight: 500; }

    .toggle-pw {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      padding: 4px;
      display: flex;
    }

    .toggle-pw svg { width: 17px; height: 17px; }

    /* ── Error ── */
    .error-msg {
      background: #fdeaea;
      color: var(--danger);
      font-size: 13px;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 14px;
      display: none;
      align-items: center;
      gap: 6px;
      border: 1px solid #fbcfcf;
    }

    .error-msg.show { display: flex; }
    .error-msg svg  { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Login Button ── */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--yellow) 0%, var(--yellow-dark) 100%);
      color: var(--text);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      font-family: 'Quicksand', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .2s, transform .1s;
      box-shadow: 0 4px 16px rgba(245,200,58,.4);
      letter-spacing: .01em;
      margin-top: 4px;
    }

    .btn-login:active { transform: scale(.99); opacity: .9; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-login svg { width: 19px; height: 19px; }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(30,58,56,.2);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Demo Accounts ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 14px;
    }

    .divider-line { flex: 1; height: 1px; background: var(--border); }

    .divider-text {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }

    .hint-accounts {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .hint-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 13px;
      cursor: pointer;
      transition: all .15s;
    }

    .hint-row:active {
      background: var(--teal-xlight);
      border-color: var(--teal);
    }

    .role-badge {
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: .04em;
      flex-shrink: 0;
    }

    .badge-admin   { background: var(--yellow-light); color: var(--yellow-dark); }
    .badge-pegawai { background: var(--teal-xlight); color: var(--teal-deeper); border: 1px solid var(--border); }

    .hint-info { flex: 1; min-width: 0; }

    .hint-username {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .hint-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      margin-top: 1px;
    }

    .hint-arrow {
      color: var(--text-light);
      flex-shrink: 0;
    }

    .hint-arrow svg { width: 16px; height: 16px; }

    /* ── Footer ── */
    .footer {
      margin-top: 20px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,.5);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .footer strong { color: rgba(255,255,255,.75); font-weight: 700; }
  </style>
</head>
<body>

  <div class="brand-top">
    <div class="brand-camera">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
        <path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </div>
    <div class="brand-name"><span class="re">re</span><span class="Frame">Frame</span></div>
    <div class="brand-sub">photobooth</div>
  </div>

  <div class="card">
    <div class="card-title">Selamat Datang 👋</div>
    <div class="card-subtitle">Masuk untuk mencatat absensi Anda</div>

    <div class="error-msg" id="errorMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">Username atau password salah</span>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <input type="text" id="username" placeholder="Masukkan username"
            autocomplete="username" autocapitalize="none" spellcheck="false" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" id="password" placeholder="Masukkan password"
            autocomplete="current-password" required>
          <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
        </svg>
        <span id="btnText">Masuk</span>
      </button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Akun Demo</span>
      <div class="divider-line"></div>
    </div>

    <div class="hint-accounts">
      <div class="hint-row" onclick="fillCredentials('admin','admin123')">
        <span class="role-badge badge-admin">Admin</span>
        <div class="hint-info">
          <div class="hint-username">admin / admin123</div>
          <div class="hint-name">Administrator</div>
        </div>
        <span class="hint-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </span>
      </div>
      <div class="hint-row" onclick="fillCredentials('budi','budi123')">
        <span class="role-badge badge-pegawai">Pegawai</span>
        <div class="hint-info">
          <div class="hint-username">budi / budi123</div>
          <div class="hint-name">Budi Santoso</div>
        </div>
        <span class="hint-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </span>
      </div>
      <div class="hint-row" onclick="fillCredentials('sari','sari123')">
        <span class="role-badge badge-pegawai">Pegawai</span>
        <div class="hint-info">
          <div class="hint-username">sari / sari123</div>
          <div class="hint-name">Sari Dewi</div>
        </div>
        <span class="hint-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </span>
      </div>
    </div>
  </div>

  <p class="footer">&ldquo;Reborn in Every Frame&rdquo; &mdash; <strong>reFrame</strong> photobooth</p>

  <script>
    function fillCredentials(u, p) {
      document.getElementById('username').value = u;
      document.getElementById('password').value = p;
    }

    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        pw.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn    = document.getElementById('loginBtn');
      const btnText= document.getElementById('btnText');
      const errMsg = document.getElementById('errorMsg');
      const errTxt = document.getElementById('errorText');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      errMsg.classList.remove('show');
      btn.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span>&nbsp;Masuk...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errTxt.textContent = data.error || 'Login gagal';
          errMsg.classList.add('show');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        } else {
          localStorage.setItem('authToken', data.token);
          window.location.href = '/';
        }
      } catch {
        errTxt.textContent = 'Koneksi gagal. Periksa server.';
        errMsg.classList.add('show');
      } finally {
        btn.disabled = false;
        btnText.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="19" height="19"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> Masuk`;
      }
    });
  </script>
</body>
</html>
